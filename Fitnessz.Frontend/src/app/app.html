<header class="top-bar">
  <div class="top-bar-content">
    <button class="mobile-menu-btn">☰</button>
    <div class="logo">Fitnessz.hu</div>
    @if (authService.isLoggedIn())
    {
      <button (click)="authService.Logout()" class="logout-btn">Kijelentkezés</button>
    } @else {
      <button routerLink="/bejelentkezes" class="login-btn">Bejelentkezés</button>
    }

  </div>
</header>
<div class="main-layout">
  <aside class="left-sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Témák</div>
      <a routerLink="/kategoria/3" class="topic-item">
        <span class="topic-icon">💪</span>
        <span class="topic-name"> Fizikum check</span>
      </a>
      <a routerLink="/kategoria/4" class="topic-item active">
        <span class="topic-icon">💊 </span>
        <span class="topic-name">Táplálékkiegészítők</span>
      </a>
      <a routerLink="/kategoria/2" class="topic-item">
        <span class="topic-icon">🥗</span>
        <span class="topic-name">Étkezés</span>
      </a>
      <a routerLink="/kategoria/1" class="topic-item">
        <span class="topic-icon">🗓️</span>
        <span class="topic-name">Edzésterv</span>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>

<div class="thread-detail-container">
  <div class="thread-detail-wrapper">


    <div class="thread-header">
      <span class="category-badge">{{  thread()?.categoryName}}</span>
      <h1 class="thread-title">{{ thread()?.title }}</h1>

      <div class="thread-meta">
        <div class="author-info">
          <div class="avatar">{{ thread()?.authorName?.charAt(0)?.toUpperCase()}}</div>
          <div class="author-details">
            <span class="author-name">{{ thread()?.authorName }}</span>
            <span class="post-date">{{ thread()?.createdAt | date:'yyyy. MMMM dd. HH:mm' }}</span>
          </div>
        </div>
      </div>
    </div>


    <div class="thread-content">
      <p>{{ thread()?.content}}</p>
    </div>

  </div>
</div>
